<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Application Form</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-100 via-white to-purple-200 flex items-center justify-center px-4">

  <div class="w-full max-w-2xl bg-white/80 backdrop-blur-lg shadow-xl rounded-xl p-8">

    <!-- HEADER -->
    <header class="text-center mb-8">
      <h1 class="text-3xl font-semibold text-gray-800">Internship Application Form</h1>
      <p class="text-gray-600 italic mt-2">Apply below to join our internship program</p>
    </header>

    <!-- FORM -->
    <form class="space-y-6">

      <!-- NAME -->
      <div>
        <label class="block mb-1 text-gray-700">Name</label>
        <input type="text" placeholder="Enter your name"
          class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block mb-1 text-gray-700">Email</label>
        <input type="email" placeholder="Enter your email"
          class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">
      </div>

      <!-- AGE -->
      <div>
        <label class="block mb-1 text-gray-700">Age (optional)</label>
        <input type="number" placeholder="Age"
          class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">
      </div>

      <!-- EDUCATION -->
      <div>
        <p class="mb-2 text-gray-700">What is your current education level?</p>
        <select class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">
          <option disabled selected>Select education</option>
          <option>Undergraduate</option>
          <option>Postgraduate</option>
          <option>Diploma</option>
          <option>Other</option>
        </select>
      </div>

      <!-- INTERNSHIP TYPE -->
      <div>
        <p class="mb-2 text-gray-700">Which internship are you interested in?</p>

        <div class="space-y-2 text-gray-700">
          <label class="flex items-center gap-2">
            <input type="radio" name="internship" class="accent-blue-500">
            Frontend Development
          </label>

          <label class="flex items-center gap-2">
            <input type="radio" name="internship" class="accent-blue-500">
            Backend Development
          </label>

          <label class="flex items-center gap-2">
            <input type="radio" name="internship" class="accent-blue-500">
            Fullstack Development
          </label>

          <label class="flex items-center gap-2">
            <input type="radio" name="internship" class="accent-blue-500">
            UI/UX Design
          </label>
        </div>
      </div>

      <!-- AVAILABILITY -->
      <div>
        <p class="mb-2 text-gray-700">When can you start?</p>
        <select class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">
          <option disabled selected>Select availability</option>
          <option>Immediately</option>
          <option>In 1 week</option>
          <option>In 2 weeks</option>
          <option>Next month</option>
        </select>
      </div>

      <!-- SKILLS -->
      <div>
        <p class="mb-2 text-gray-700">Skills (Select all that apply)</p>

        <div class="grid grid-cols-2 gap-2 text-gray-700">
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> HTML</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> CSS</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> JavaScript</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> React</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> Node.js</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> MongoDB</label>
          <label class="flex items-center gap-2"><input type="checkbox" class="accent-green-500"> Figma</label>
        </div>
      </div>

      <!-- MESSAGE -->
      <div>
        <p class="mb-2 text-gray-700">Why do you want this internship?</p>
        <textarea rows="4" placeholder="Explain briefly..."
          class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
      </div>

      <!-- BUTTON -->
      <button
        class="w-full py-3 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold rounded-lg hover:scale-105 transition">
        Submit
      </button>

    </form>
  </div>

</body>
</html>
