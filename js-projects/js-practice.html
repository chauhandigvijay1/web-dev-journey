//Triangle Validity
        function isValidTriangle(a, b, c) {
    if (a + b > c && b + c > a && a + c > b) {
        console.log("Valid Triangle");
    } else {
        console.log("Not a Triangle");
    }
}

isValidTriangle(3, 4, 5);

//Sum of digits
    //Method 1
        function sumOfDigits(num) {
            let sum = 0;
            for (let i = num; i > 0; i = Math.floor(i / 10)) {
                sum += i % 10;
            }
            return sum;
        }
        console.log(sumOfDigits(1234));

    //Method 2
        function sumOfDigits(num) {
            let sum = 0;
            while (num > 0) {
                let digit = num % 10;   // last digit
                sum = sum + digit;      // add
                num = Math.floor(num / 10); // remove last digit
                }
                return sum;
            }
            console.log(sumOfDigits(1234));

    //Method 3
        let num = 1234;
        let sum = num.toString().split('').reduce((a, b) => a + Number(b), 0);
        console.log(sum);

//Reverse a number
        function reverseNum(num) {
            let rev = 0;
            
            while (num > 0) {
                let digit = num % 10;
                rev = rev * 10 + digit;
                num = Math.floor(num / 10);
            }
            
            return rev;
        }
        
        console.log(reverseNum(1234));

//Palindrome Number
        function isPalindrome(num) {
            let original = num;
            let rev = 0;
            
            while (num > 0) {
                let digit = num % 10;
                rev = rev * 10 + digit;
                num = Math.floor(num / 10);
            }
            if (original === rev) {
                console.log("Palindrome");
            } else {
                console.log("Not Palindrome");
            }
        }
        
        isPalindrome(121);

/*Armstrong Number
example - 1³ + 5³ + 3³ = 153*/
        function isArmstrong(num) {
            let original = num;
            let sum = 0;
            let digits = num.toString().length;
            
            while (num > 0) {
                let digit = num % 10;
                sum += digit ** digits;
                num = Math.floor(num / 10);
            }
            
            if (sum === original) {
                console.log("Armstrong");
            } else {
                console.log("Not Armstrong");
            }
        }
        isArmstrong(153);

//Count Digits
        function countDigits(num) {
            let count = 0;
            while (num > 0) {
                count++;
                num = Math.floor(num / 10);
            }
            return count;
        }
        console.log(countDigits(12345));

//Print Patterns
    //Square Patterns
        for (let i = 1; i <= 4; i++) {
            let row = "";
            for (let j = 1; j <= 4; j++) {
                row += "*";
            }
            console.log(row);
        }

    //Right Triangle
        for (let i = 1; i <= 4; i++) {

            for (let j = 1; j <= i; j++) {
                row += "* ";
            }
            console.log(row);
        }

    //Reverse Triangle
        for (let i = 4; i >= 1; i--) {
        let row = "";
        for (let j = 1; j <= i; j++) {
            row += "* ";
        }
        console.log(row);
        }

    //Number Pattern
        for (let i = 1; i <= 4; i++) {
        let row = "";
        for (let j = 1; j <= i; j++) {
            row += j + " ";
        }
        console.log(row);
        }

//Fibonacci Series
        function fibonacci(n) {
            let a = 0, b = 1;
            
            for (let i = 1; i <= n; i++) {
                console.log(a);
                let next = a + b;
                a = b;
                b = next;
            }
        }
        
        fibonacci(15);

//Prime Number
        function isPrime(num) {
            if (num < 2) return "Not Prime";
            
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) {
                    return "Not Prime";
                }
            }
            
            return "Prime";
        }
        
        console.log(isPrime(7));

//Factorial Number
        function factorial(n) {
            let fact = 1;
            
            for (let i = 1; i <= n; i++) {
                fact *= i;
            }
            
            return fact;
        }
        console.log(factorial(5));

//Pyramid Pattern
        let y = 5;
        for (let i = 1; i <= y; i++) {
            let row = "";

        // spaces
        for (let j = 1; j <= y - i; j++) {
            row += " ";
        }

        // stars
        for (let k = 1; k <= (2 * i - 1); k++) {
            row += "*";
        }

        console.log(row);
    }

//Diamond Pattern
        let n = 5;

        // upper
        for (let i = 1; i <= n; i++) {
            let row = "";

            for (let j = 1; j <= n - i; j++) row += " ";
            for (let k = 1; k <= (2 * i - 1); k++) row += "*";

            console.log(row);
        }

        // lower
        for (let i = n - 1; i >= 1; i--) {
            let row = "";

            for (let j = 1; j <= n - i; j++) row += " ";
            for (let k = 1; k <= (2 * i - 1); k++) row += "*";

            console.log(row);
        }
