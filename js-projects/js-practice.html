//Triangle Validity
        function isValidTriangle(a, b, c) {
    if (a + b > c && b + c > a && a + c > b) {
        console.log("Valid Triangle");
    } else {
        console.log("Not a Triangle");
    }
}

isValidTriangle(3, 4, 5);

//Sum of digits
    //Method 1
        function sumOfDigits(num) {
            let sum = 0;
            for (let i = num; i > 0; i = Math.floor(i / 10)) {
                sum += i % 10;
            }
            return sum;
        }
        console.log(sumOfDigits(1234));

    //Method 2
        function sumOfDigits(num) {
            let sum = 0;
            while (num > 0) {
                let digit = num % 10;   // last digit
                sum = sum + digit;      // add
                num = Math.floor(num / 10); // remove last digit
                }
                return sum;
            }
            console.log(sumOfDigits(1234));

    //Method 3
        let num = 1234;
        let sum = num.toString().split('').reduce((a, b) => a + Number(b), 0);
        console.log(sum);

//Reverse a number
        function reverseNum(num) {
            let rev = 0;
            
            while (num > 0) {
                let digit = num % 10;
                rev = rev * 10 + digit;
                num = Math.floor(num / 10);
            }
            
            return rev;
        }
        
        console.log(reverseNum(1234));

//Palindrome Number
        function isPalindrome(num) {
            let original = num;
            let rev = 0;
            
            while (num > 0) {
                let digit = num % 10;
                rev = rev * 10 + digit;
                num = Math.floor(num / 10);
            }
            if (original === rev) {
                console.log("Palindrome");
            } else {
                console.log("Not Palindrome");
            }
        }
        
        isPalindrome(121);

/*Armstrong Number
example - 1³ + 5³ + 3³ = 153*/
        function isArmstrong(num) {
            let original = num;
            let sum = 0;
            let digits = num.toString().length;
            
            while (num > 0) {
                let digit = num % 10;
                sum += digit ** digits;
                num = Math.floor(num / 10);
            }
            
            if (sum === original) {
                console.log("Armstrong");
            } else {
                console.log("Not Armstrong");
            }
        }
        isArmstrong(153);

//Count Digits
        function countDigits(num) {
            let count = 0;
            while (num > 0) {
                count++;
                num = Math.floor(num / 10);
            }
            return count;
        }
        console.log(countDigits(12345));
